<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Remember — Your Daily Reminder App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #e8e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
    .hero { text-align: center; max-width: 600px; }
    .app-icon { width: 180px; height: 180px; border-radius: 40px; margin: 0 auto 24px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .app-icon img { width: 100%; height: 100%; object-fit: cover; }
    h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 12px; background: linear-gradient(135deg, #c084fc, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p { font-size: 1.1rem; color: #94a3b8; line-height: 1.6; margin-bottom: 32px; }
    .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    a { padding: 12px 28px; border-radius: 50px; text-decoration: none; font-weight: 600; font-size: 0.95rem; transition: opacity 0.2s; }
    a:hover { opacity: 0.8; }
    .primary { background: linear-gradient(135deg, #6e4cf5, #b06cf5); color: white; }
    .secondary { border: 1px solid #334155; color: #94a3b8; }
    .footer { margin-top: 48px; font-size: 0.8rem; color: #475569; }
  </style>
</head>
<body>
  <div class="hero">
    <div class="app-icon"><img src="icon.png" alt="Remember app icon"/></div>
    <h1>Remember</h1>
    <p>One meaningful reminder a day. Track habits, set goals, run challenges — all on your device with zero data collection.</p>
    <div class="links">
      <a href="#" class="primary">Download on the App Store</a>
      <a href="support.html" class="secondary">Support</a>
      <a href="privacy.html" class="secondary">Privacy Policy</a>
    </div>
  </div>
  <div class="footer">
    <p>© 2026 Ashish Nagar · <a href="privacy.html" style="color:#475569;">Privacy Policy</a> · <a href="support.html" style="color:#475569;">Support</a></p>
  </div>
</body>
</html>
